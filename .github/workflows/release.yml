name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
      - run: pnpm build:all

      - name: Package release assets
        run: |
          cd dist
          cp tampermonkey/tree-convo.user.js .
          cd chrome && zip -r ../tree-convo-chrome.zip . && cd ..
          cd firefox && zip -r ../tree-convo-firefox.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/tree-convo.user.js
            dist/tree-convo-chrome.zip
            dist/tree-convo-firefox.zip
